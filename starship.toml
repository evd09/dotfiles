format = "$directory$git_branch$git_status$cmd_duration$time$line_break$character"

[directory]
style = "bg:#7aa2f7 fg:#1a1b26"
format = "[ $path ]($style)"
truncation_length = 3

[character]
success_symbol = "[❯](bold #bb9af7)"
error_symbol = "[❯](bold #f7768e)"

[time]
disabled = false
style = "bg:#1a1b26 fg:#c0caf5"
format = "[ ⏱ $time ]($style)"
time_format = "%H:%M"

[git_branch]
style = "bg:#bb9af7 fg:#1a1b26"
format = "[ $symbol$branch ]($style)"

[git_status]
style = "bg:#bb9af7 fg:#1a1b26"
format = "[$all_status$ahead_behind]($style)"
