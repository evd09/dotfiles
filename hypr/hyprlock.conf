background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 2
    brightness = 0.4
    contrast = 0.8
    vibrancy = 0.1
}

# --- TOP BAR ---
label {
    monitor =
    text = cmd[update:5000] echo "$(date +'%I:%M %p')  |  $(date +'%A, %B %d')  |  $(cat /sys/class/power_supply/BAT0/capacity)% 󰁹"
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -10
    halign = center
    valign = top
    color = rgba(255, 255, 255, 0.9)
}

# --- GREETING ---
label {
    monitor =
    text = cmd[update:3600000] echo "Quack....Quack....Quack.... 🦆"
    font_size = 36
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
    color = rgba(255, 255, 255, 0.9)
}

# --- UPTIME ---
label {
    monitor =
    text = cmd[update:60000] echo "󰅐 Uptime: $(uptime -p | sed 's/up //')"
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 20
    halign = center
    valign = center
    color = rgba(255, 255, 255, 0.6)
}


input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    outer_color = rgb(ffcc00)
    inner_color = rgba(26, 27, 38, 0.8)
    font_color = rgb(ffffff)
    placeholder_text = <i>Enter Password...</i>
    fail_text = <i>❌ Failed $ATTEMPTS time(s) - Try again</i>
    fail_color = rgb(ff6600)
    fail_timeout = 2000
    check_color = rgb(ffcc00)
    position = 0, -100
    halign = center
    valign = center
    hide_input = false
    dots_fade_time = 0
    fade_on_empty = false
    fade_timeout = 0
}
