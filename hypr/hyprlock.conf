background {
    monitor =
    path = screenshot
    blur_passes = 8
    blur_size = 15
    brightness = 0.4
    contrast = 0.8
    vibrancy = 0.1
}


label {
    monitor =
    text = cmd[update:1000] date +"%I:%M %p"
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 150
    halign = center
    valign = center
    color = rgba(255, 255, 255, 0.9)
}
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    outer_color = rgb(ffcc00)
    inner_color = rgba(26, 27, 38, 0.8)
    font_color = rgb(ffffff)
    placeholder_text = <i>Fingerprint or Password...</i>
    position = 0, -100
    halign = center
    valign = center
    fail_text = <i>Authentication failed</i>
    fail_color = rgb(ff6600)
    check_color = rgb(ffcc00)
}

label {
    monitor =
    text = cmd[update:1000] date +"%A, %B %d %Y"
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = 0, 60
    halign = center
    valign = center
    color = rgba(255, 255, 255, 0.7)
}

